            <style>
                * {

                body {

                body::before {

                        ),

                .container {

                    left: 50%;

                .title {

                    letter-spacing: 0.1em;

                @keyframes fadeInDown {
                    from {
                        opacity: 0;
                        transform: translateY(-30px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }

                .countdown {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 0.8rem;
                    flex-wrap: nowrap;
                    width: 100%;
                    max-width: 100%;
                }

                .time-unit {
                    background: rgba(255, 255, 255, 0.06);
                    backdrop-filter: blur(10px);
                    border-radius: 16px;
                    padding: 2rem 1rem;
                    min-width: 80px;
                    flex-shrink: 1;
                    transition: all 0.3s ease;
                    border: 1px solid rgba(255, 255, 255, 0.14);
                    animation: fadeInUp 0.8s ease-out backwards;
                }

                .time-unit:nth-child(1) {
                    animation-delay: 0.1s;
                }
                .time-unit:nth-child(2) {
                    animation-delay: 0.2s;
                }
                .time-unit:nth-child(3) {
                    animation-delay: 0.3s;
                }
                .time-unit:nth-child(4) {
                    animation-delay: 0.4s;
                }
                .time-unit:nth-child(5) {
                    animation-delay: 0.5s;
                }
                .time-unit:nth-child(6) {
                    animation-delay: 0.6s;
                }

                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateY(30px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }

                .time-unit:hover {
                    background: rgba(34, 197, 94, 0.08);
                    border-color: rgba(34, 197, 94, 0.45);
                    transition: all 0.3s ease;
                }

                .label {
                    color: rgba(255, 255, 255, 0.7);
                    font-size: 0.9rem;
                    font-weight: 600;
                    letter-spacing: 0.2em;
                    text-transform: uppercase;
                    margin-bottom: 0.5rem;
                }

                .value {
                    color: rgba(255, 255, 255, 0.92);
                    font-size: 3.5rem;
                    font-weight: 700;
                    line-height: 1;
                    transition: all 0.3s ease;
                }


                .separator {
                    color: rgba(255, 255, 255, 0.92);
                    font-size: 3.5rem;
                    font-weight: 700;
                    display: flex;
                    align-items: center;
                    animation: pulse 2s ease-in-out infinite;
                }

                @keyframes pulse {
                    0%,
                    100% {
                        opacity: 1;
                    }
                    50% {
                        opacity: 0.5;
                    }
                }

                .background-particles {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    pointer-events: none;
                    overflow: hidden;
                    z-index: -1;
                }

                .particle {
                    position: absolute;
                    width: 4px;
                    height: 4px;
                    background: rgba(34, 197, 94, 0.5);
                    border-radius: 50%;
                    animation: float 15s infinite;
                }

                @keyframes float {
                    0% {
                        transform: translateY(100vh) translateX(0);
                        opacity: 0;
                    }
                    10% {
                        opacity: 1;
                    }
                    90% {
                        opacity: 1;
                    }
                    100% {
                        transform: translateY(-100vh) translateX(100px);
                        opacity: 0;
                    }
                }

                /* Responsive Design */
                @media (max-width: 768px) {
                    .title {

                    .label {

                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                        max-width: 100%;
                    }

                    .separator {
                        font-size: 1.4rem;
                    }

                    .floating-links-container {
                        gap: 0.8rem;
                        margin-top: 1.5rem;
                    }

                    .floating-link {
                        width: 45px;

                    }
                }

                /* Touch feedback for mobile */
                @media (hover: none) {
                    .time-unit:active {
                        background: rgba(34, 197, 94, 0.15);
                    }
                }

                /* Intro Animation */
                .intro-overlay {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: #0b1020;
                    z-index: 9999;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    animation: curtainReveal 2s ease-in-out forwards;
                }

                .intro-curtain-left,
                .intro-curtain-right {
                    position: absolute;
                    width: 50%;
                    height: 100%;
                    background: #0b1020;
                }

                .intro-curtain-left {
                    left: 0;
                    animation: slideLeft 1.5s ease-in-out 0.5s forwards;
                }

                .intro-curtain-right {
                    right: 0;
                    animation: slideRight 1.5s ease-in-out 0.5s forwards;
                }

                @keyframes slideLeft {
                    to {
                        transform: translateX(-100%);
                    }
                }

                @keyframes slideRight {
                    to {
                        transform: translateX(100%);
                    }
                }

                @keyframes curtainReveal {
                    to {
                        opacity: 0;
                        pointer-events: none;
                    }
                }

                /* Floating Links */
                .floating-links-container {
                    display: flex;
                    justify-content: center;
                    gap: 1.5rem;
                    margin-top: 3rem;
                }

                .floating-link {
                    padding: 0.5rem;
                    background: rgba(255, 255, 255, 0.06);

                    border: 1px solid rgba(255, 255, 255, 0.14);

                    text-decoration: none;
                    font-size: 2rem;
                    transition: all 0.3s ease;
                    z-index: 100;
                    cursor: grab;
                    user-select: none;
                    width: 60px;
                    height: 60px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    overflow: hidden;
                }

                .floating-link img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    border-radius: 50%;
                }

                .floating-link:active {
                    cursor: grabbing;
                }

                .floating-link:hover {
                    background: rgba(34, 197, 94, 0.08);
                    border-color: rgba(34, 197, 94, 0.45);
                }

                .bottom-right-logo {
                    position: fixed;
                    bottom: 20px;
                    right: 20px;
                    width: 60px;
                    height: 60px;
                    border-radius: 50%;
                    z-index: 100;
                    opacity: 0.8;
                    filter: invert(1);
                }

                /* Preview Modal */
                .image-preview-backdrop {
                    position: fixed;
                    inset: 0;
                    background: radial-gradient(
                        circle at center,
                        rgba(11, 16, 32, 0.8),
                        rgba(0, 0, 0, 0.9)
                    );
                    backdrop-filter: blur(10px);
                    z-index: 10000;
                    display: none;
                    align-items: center;
                    justify-content: center;
                }

                .image-preview-backdrop.open {
                    display: flex;
                    animation: backdropFadeIn 0.3s ease-out;
                }

                .image-preview-container {
                    background: rgba(11, 16, 32, 0.95);
                    border: 1px solid rgba(34, 197, 94, 0.3);
                    border-radius: 16px;
                    padding: 20px;
                    max-width: 90vw;
                    max-height: 90vh;
                    overflow: auto;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                }

                .image-preview-backdrop.open .image-preview-container {
                    opacity: 1;
                }

                .image-preview-backdrop.closing .image-preview-container {
                    opacity: 0;
                    transition: opacity 0.25s ease-in-out;
                }

                .image-preview-backdrop.closing {
                    pointer-events: none;
                }

                .image-preview-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 16px;
                }

                .image-preview-title {
                    color: white;
                    margin: 0;
                    font-size: 18px;
                    font-weight: 600;
                }

                .image-preview-close {
                    background: rgba(34, 197, 94, 0.2);
                    border: 1px solid rgba(34, 197, 94, 0.4);
                    color: white;
                    border-radius: 8px;
                    padding: 8px 12px;
                    cursor: pointer;
                    font-size: 14px;
                    transition: all 0.2s ease;
                }

                .image-preview-close:hover {
                    background: rgba(34, 197, 94, 0.3);
                    border-color: rgba(34, 197, 94, 0.6);
                }

                .image-preview-content {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }

                .preview-image {
                    max-width: 100%;
                    max-height: 70vh;
                    border-radius: 8px;
                    border: 2px solid rgba(34, 197, 94, 0.2);
                }

                @keyframes backdropFadeIn {
                    from {
                        opacity: 0;
                    }
                    to {
                        opacity: 1;
                    }
                }

                @keyframes backdropFadeOut {
                    from {
                        opacity: 1;
                    }
                    to {
                        opacity: 0;
                    }
                }

        <body>
            <div class="intro-overlay">
                <div class="intro-curtain-left"></div>
                <div class="intro-curtain-right"></div>
            </div>

            <div class="background-particles" id="particles"></div>

            <div class="container" id="mainContent">
                <div class="total-days" id="totalDays">0</div>
                <h1 class="title">DAYS LEFT</h1>
                <div class="countdown">
                    <div class="time-unit">
                        <div class="label">Months</div>
                        <div class="value" id="months">00</div>
                    </div>
                    <div class="time-unit">
                        <div class="label">Days</div>
                        <div class="value" id="days">00</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <div class="label">Hours</div>
                        <div class="value" id="hours">00</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <div class="label">Minutes</div>
                        <div class="value" id="minutes">00</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <div class="label">Seconds</div>
                        <div class="value" id="seconds">00</div>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-unit">
                        <div class="label">Milliseconds</div>
                        <div class="value" id="milliseconds">000</div>
                    </div>
                </div>
                <h1 class="title">TILL MOCK 1</h1>
                <div class="floating-links-container">
                    <a
                        href="#"
                        class="floating-link"
                        data-image="acadamiccal.jpg"
                        data-title="Academic Calendar"
                        >📅</a
                    >
                    <a
                        href="https://dhaec.edupage.org"
                        class="floating-link"
                        target="_blank"
                        >📚</a
                    >
                </div>
            </div>

            <img src="logo.png" alt="Logo" class="bottom-right-logo">

            <div
                id="imageModalBackdrop"
                class="image-preview-backdrop"
                role="dialog"
                aria-modal="true"
                aria-label="Image preview"
            >
                <div class="image-preview-container">
                    <div class="image-preview-header">
                        <h3 id="imageModalTitle" class="image-preview-title">
                            Image Preview
                        </h3>
                        <button
                            id="imageModalClose"
                            class="image-preview-close"
                            type="button"
                        >
                            X
                        </button>
                    </div>
                    <div class="image-preview-content">
                        <img
                            id="imageModalImg"
                            src=""
                            alt=""
                            class="preview-image"
                        />
                    </div>
                </div>
            </div>

            <script>
                // Create floating particles
                function createParticles() {
                    const particlesContainer =
                        document.getElementById("particles");
                    const particleCount = 50;

                    for (let i = 0; i < particleCount; i++) {
                        const particle = document.createElement("div");
                        particle.className = "particle";
                        particle.style.left = Math.random() * 100 + "%";
                        particle.style.top = Math.random() * 100 + "%";
                        particle.style.animationDelay =
                            Math.random() * 15 + "s";
                        particle.style.animationDuration =
                            Math.random() * 10 + 10 + "s";
                        particlesContainer.appendChild(particle);
                    }
                }

                // Countdown logic
                function updateCountdown() {
                    const targetDate = new Date(
                        "June 30, 2026 06:45:00",
                    ).getTime();
                    const now = new Date().getTime();
                    const difference = targetDate - now;

                    if (difference > 0) {
                        // Calculate total days
                        const totalDays = Math.floor(
                            difference / (1000 * 60 * 60 * 24),
                        );
                        document.getElementById("totalDays").textContent =
                            totalDays;

                        // Calculate months, days, hours, minutes, seconds, milliseconds
                        const current = new Date();
                        const target = new Date(targetDate);
                        
                        let months = (target.getFullYear() - current.getFullYear()) * 12;
                        months -= current.getMonth();
                        months += target.getMonth();
                        
                        // Adjust if current day is after target day
                        if (current.getDate() > target.getDate()) {
                            months--;
                        }
                        
                        // Calculate a temporary date with the months added
                        const tempDate = new Date(current);
                        tempDate.setMonth(tempDate.getMonth() + months);
                        
                        // Calculate remaining time
                        let remainingDiff = target - tempDate;
                        
                        // If remaining diff is negative, adjust months
                        if (remainingDiff < 0) {
                            months--;
                            tempDate.setMonth(tempDate.getMonth() - 1);
                            remainingDiff = target - tempDate;
                        }
                        
                        const days = Math.floor(remainingDiff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((remainingDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((remainingDiff % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((remainingDiff % (1000 * 60)) / 1000);
                        const milliseconds = remainingDiff % 1000;

                        document.getElementById("months").textContent = months
                            .toString()
                            .padStart(2, "0");
                        document.getElementById("days").textContent = days
                            .toString()
                            .padStart(2, "0");
                        document.getElementById("hours").textContent = hours
                            .toString()
                            .padStart(2, "0");
                        document.getElementById("minutes").textContent = minutes
                            .toString()
                            .padStart(2, "0");
                        document.getElementById("seconds").textContent = seconds
                            .toString()
                            .padStart(2, "0");
                        document.getElementById("milliseconds").textContent = milliseconds
                            .toString()
                            .padStart(3, "0");
                    } else {
                        document.getElementById("totalDays").textContent = "0";
                        document.getElementById("months").textContent = "00";
                        document.getElementById("days").textContent = "00";
                        document.getElementById("hours").textContent = "00";
                        document.getElementById("minutes").textContent = "00";
                        document.getElementById("seconds").textContent = "00";
                        document.getElementById("milliseconds").textContent = "000";
                    }
                }

                // Initialize
                createParticles();
                updateCountdown();
                setInterval(updateCountdown, 10);

                // Mouse parallax effect with smooth animation
                let mouseX = 0;
                let mouseY = 0;
                let currentX = 0;
                let currentY = 0;

                document.addEventListener("mousemove", (e) => {
                    mouseX = (window.innerWidth / 2 - e.pageX) / 40;
                    mouseY = (window.innerHeight / 2 - e.pageY) / 40;
                });

                function animateParallax() {
                    currentX += (mouseX - currentX) * 0.08;
                    currentY += (mouseY - currentY) * 0.08;

                    const container = document.getElementById("mainContent");
                    const particles = document.getElementById("particles");

                    container.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
                    particles.style.transform = `translate(${currentX * 0.5}px, ${currentY * 0.5}px)`;

                    requestAnimationFrame(animateParallax);
                }

                animateParallax();

                // Image preview modal functionality
                function imageModalApi() {
                    const backdrop =
                        document.getElementById("imageModalBackdrop");
                    const title = document.getElementById("imageModalTitle");
                    const img = document.getElementById("imageModalImg");
                    const closeBtn = document.getElementById("imageModalClose");

                    function close() {
                        if (!backdrop) return;

                        // Add closing class for outro animation
                        backdrop.classList.add("closing");

                        // Wait for animation to complete before cleaning up
                        setTimeout(() => {
                            backdrop.classList.remove("open", "closing");
                            img.src = "";
                            img.alt = "";
                        }, 250);
                    }

                    function openImage(
                        imageSrc,
                        imageTitle,
                        clickEvent = null,
                    ) {
                        if (!backdrop || !title || !img) return;

                        title.textContent = imageTitle;
                        img.src = imageSrc;
                        img.alt = imageTitle;

                        backdrop.classList.add("open");
                    }

                    // Close on backdrop click
                    backdrop?.addEventListener("click", function (e) {
                        if (e.target === backdrop) {
                            close();
                        }
                    });

                    // Close on button click
                    closeBtn?.addEventListener("click", close);

                    // Close on Escape key
                    document.addEventListener("keydown", function (e) {
                        if (
                            e.key === "Escape" &&
                            backdrop?.classList.contains("open")
                        ) {
                            close();
                        }
                    });

                    return { openImage, close };
                }

                // Initialize image modal
                const imageModal = imageModalApi();

                // Handle floating link clicks with data-image
                document.addEventListener("click", function (e) {
                    const floatingLink = e.target.closest(
                        ".floating-link[data-image]",
                    );
                    if (floatingLink) {
                        e.preventDefault();
                        const imageSrc = floatingLink.dataset.image;
                        const imageTitle = floatingLink.dataset.title;
                        imageModal.openImage(imageSrc, imageTitle, e);
                    }
                });
            </script>
